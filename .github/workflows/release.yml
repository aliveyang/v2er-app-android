name: GitHub Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v2.3.16'
        required: true
        type: string

permissions:
  contents: write

jobs:
  github-release:
    name: Build APK and Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if ! echo "$TAG" | grep -Eq '^v[0-9]+(\.[0-9]+){1,3}([-+][0-9A-Za-z.-]+)?$'; then
            echo "Release tag must look like v2.3.16, got: $TAG"
            exit 1
          fi

          VERSION="${TAG#v}"
          VERSION_CODE=$(grep "versionCode:" config.gradle | sed -E 's/.*versionCode:[[:space:]]*([0-9]+).*/\1/')

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        id: build
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "Building signed release APK with the fork signing key"
          ./gradlew assembleRelease --stacktrace
          echo "apk_dir=app/build/outputs/apk/release" >> "$GITHUB_OUTPUT"
          echo "signing_label=release-signed" >> "$GITHUB_OUTPUT"

      - name: Prepare release assets
        id: assets
        run: |
          mkdir -p release-assets
          find "${{ steps.build.outputs.apk_dir }}" -name "*.apk" -print -exec cp {} release-assets/ \;

          if ! find release-assets -name "*.apk" | grep -q .; then
            echo "No APK files were produced"
            exit 1
          fi

          for apk in release-assets/*.apk; do
            base=$(basename "$apk")
            mv "$apk" "release-assets/v2er-${{ steps.release.outputs.tag }}-${{ steps.build.outputs.signing_label }}-${base}"
          done

      - name: Generate release notes
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          VERSION="${TAG#v}"
          NOTES_FILE="RELEASE_NOTES.md"

          echo "## What's Changed" > "$NOTES_FILE"
          echo "" >> "$NOTES_FILE"

          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VERSION" '
              BEGIN { found=0; printing=0 }
              /^##[[:space:]]+v?[0-9]+\.[0-9]+\.[0-9]+/ {
                if (found && printing) { exit }
                if (match($0, "^##[[:space:]]+v?" ver "([[:space:]]|\\(|$)")) { found=1; printing=1; next }
              }
              /^---/ { if (printing) exit }
              printing { print }
            ' CHANGELOG.md >> "$NOTES_FILE"
          fi

          if [ "$(wc -l < "$NOTES_FILE")" -le 2 ]; then
            echo "Automated release for $TAG." >> "$NOTES_FILE"
          fi

          echo "" >> "$NOTES_FILE"
          echo "APK signing: ${{ steps.build.outputs.signing_label }}." >> "$NOTES_FILE"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: V2er ${{ steps.release.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: release-assets/*.apk
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
